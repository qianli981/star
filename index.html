<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>命运之戏 - 完整78牌阵</title>
  <link rel="stylesheet" href="index.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="start-screen">
    <h1>命运之戏</h1>
    <p>包含完整78张塔罗牌与正逆位流转</p>
    <button id="start-cam-btn">触碰这里，开启灵视 (授予摄像头)</button>
  </div>

  <div id="ui-layer" style="display:none;">
    <div class="header">
      <h1>命运之戏</h1><p class="subtitle">78 TAROT DECK</p>
    </div>
    <div class="status-box"><p id="status-text">等待手势指引...</p></div>
    <div class="card-info" id="card-info" style="opacity:0;"></div>
  </div>

  <video id="video-input" autoplay muted playsinline style="display:none;"></video>
  <canvas id="gesture-canvas"></canvas>

  <script src="index.js"></script>
</body>
</html>
