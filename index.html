<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>命运之戏 Play of Fate</title>
  <link rel="stylesheet" href="index.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="ui-layer">
    <div class="header">
      <h1>命运之戏</h1>
      <p class="subtitle">PLAY OF FATE</p>
    </div>
    
    <div class="status-box">
      <p id="status-text">潜入深层潜意识中...</p>
    </div>

    <div id="fallback-btn" style="display: none;">
      <button onclick="window.tarotApp.shuffle()">归流 <span>(洗牌)</span></button>
      <button onclick="window.tarotApp.draw()">启示 <span>(抽牌)</span></button>
      <button onclick="window.tarotApp.reset()">混沌 <span>(重置)</span></button>
    </div>
  </div>

  <video id="video-input" autoplay muted playsinline style="display:none;"></video>
  <canvas id="gesture-canvas"></canvas>

  <script src="index.js"></script>
</body>
</html>
